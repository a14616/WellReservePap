<nav class="mobile-bottom-nav d-lg-none" aria-label="Navegacao principal mobile">
    <a href="{% url 'home' %}" class="mobile-bottom-nav__item{% if request.path == '/' %} is-active{% endif %}">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
    </a>
    <a href="{% url 'servicos_lista' %}" class="mobile-bottom-nav__item{% if '/servicos/' in request.path %} is-active{% endif %}">
        <i class="fas fa-layer-group"></i>
        <span>Servicos</span>
    </a>
    <a href="{% url 'reserva_criar' %}" class="mobile-bottom-nav__item mobile-bottom-nav__item--cta{% if '/reservas/criar/' in request.path %} is-active{% endif %}">
        <i class="fas fa-calendar-plus"></i>
        <span>Reservar</span>
    </a>
    <a href="{% url 'produtos_lista' %}" class="mobile-bottom-nav__item{% if '/produtos/' in request.path or '/carrinho/' in request.path %} is-active{% endif %}">
        <i class="fas fa-shopping-bag"></i>
        <span>Produtos</span>
    </a>
    {% if user.is_authenticated %}
    <a href="{% url 'dashboard' %}" class="mobile-bottom-nav__item{% if '/dashboard/' in request.path or '/perfil/' in request.path %} is-active{% endif %}">
        <i class="fas fa-user-circle"></i>
        <span>Conta</span>
    </a>
    {% else %}
    <a href="{% url 'login' %}" class="mobile-bottom-nav__item{% if '/login/' in request.path or '/registo/' in request.path %} is-active{% endif %}">
        <i class="fas fa-sign-in-alt"></i>
        <span>Entrar</span>
    </a>
    {% endif %}
</nav>
