{% extends 'base.html' %}

{% block title %}Novo Bloqueio{% endblock %}

{% block content %}
<div class="container py-5">
    <h3>Novo Bloqueio</h3>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Serviço</label>
                        <select name="servico" class="form-select">
                            <option value="">-- Nenhum --</option>
                            {% for s in servicos %}
                            <option value="{{ s.pk }}">{{ s.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Funcionário</label>
                        <select name="funcionario" class="form-select">
                            <option value="">-- Nenhum --</option>
                            {% for u in funcionarios %}
                            <option value="{{ u.pk }}">{{ u.get_full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Data</label>
                        <input type="date" name="data" class="form-control" required />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hora Início</label>
                        <input type="time" name="hora_inicio" class="form-control" required />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hora Fim</label>
                        <input type="time" name="hora_fim" class="form-control" required />
                    </div>
                    <div class="col-12">
                        <label class="form-label">Motivo</label>
                        <input type="text" name="motivo" class="form-control" />
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary">Criar Bloqueio</button>
                    <a class="btn btn-outline-secondary" href="{% url 'bloqueios_gestao' %}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
